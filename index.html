<!DOCTYPE html>
<html>
<head>
  <title>Instagram video Downloader</title>
</head>

<body style="text-align:center; padding:50px; font-family:sans-serif;">

  <h1>🔥 Instagram Downloader</h1>

  <input 
    id="url" 
    placeholder="Paste Instagram link here..."
    style="width:300px; padding:10px; font-size:16px;"
  >

  <br><br>

  <button onclick="download()" style="padding:10px 20px; font-size:16px; cursor:pointer;">
    Download
  </button>

  <script>
    function download() {
      let link = document.getElementById("url").value.trim();

      // Check empty input
      if (!link) {
        alert("Please enter Instagram link");
        return;
      }

      // Basic validation (optional but good)
      if (!link.includes("instagram.com")) {
        alert("Enter valid Instagram link");
        return;
      }

      // FINAL WORKING REDIRECT (FIXED)
      window.location.href =
        "https://snapinsta.app/en?url=" + encodeURIComponent(link);
    }
  </script>

</body>
</html>
